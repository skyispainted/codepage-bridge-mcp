name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            archive: tar.gz
          - os: macos-latest
            artifact: darwin-arm64
            archive: tar.gz
          - os: windows-latest
            artifact: win32-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare release directory
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT="release/codepage-bridge-${TAG}-${{ matrix.artifact }}"
          mkdir -p "$OUT"
          cp -R dist "$OUT/"
          cp -R node_modules "$OUT/"
          cp package.json "$OUT/"
          cp LICENSE "$OUT/"
          cp README.md "$OUT/"
          cp README_CN.md "$OUT/"
          cp -R examples "$OUT/"
          cp -R install "$OUT/"

      - name: Archive release (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NAME="codepage-bridge-${TAG}-${{ matrix.artifact }}"
          tar -czf "${NAME}.tar.gz" -C release "$NAME"

      - name: Archive release (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $name = "codepage-bridge-$tag-${{ matrix.artifact }}"
          Compress-Archive -Path "release/$name" -DestinationPath "$name.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codepage-bridge-${{ github.ref_name }}-${{ matrix.artifact }}.${{ matrix.archive }}
